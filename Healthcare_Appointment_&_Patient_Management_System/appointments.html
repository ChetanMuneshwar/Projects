<!DOCTYPE html>
<html>
<head>
<title>Appointments</title>

<!-- Bootstrap -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        position: relative;
        min-height: 100vh;
    }

    /* Background Image */
    body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: url("./Assets/appointment_bg_image.jpg") no-repeat center;
        background-size: cover;
        z-index: -2;
    }

    /* Overlay */
    body::after {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: -1;
    }

    /* Card */
    .appointment-card {
        border-radius: 15px;
        background: rgba(255,255,255,0.95);
    }

    /* Header */
    .card-header {
        background: #6c757d;
        color: white;
    }

    /* Title */
    .page-title {
        text-align: center;
        color: white;
        margin-bottom: 20px;
        font-weight: bold;
    }
</style>

</head>

<body>

<div class="container mt-5">

    <h2 class="page-title">📅 Appointments Management</h2>

    <div class="card appointment-card shadow">

        <!-- Header -->
        <div class="card-header d-flex justify-content-between align-items-center">
            <h4 class="mb-0">Appointments List</h4>
            <button class="btn btn-light" data-bs-toggle="modal" data-bs-target="#modal">
                + Book Appointment
            </button>
        </div>

        <!-- Body -->
        <div class="card-body">

            <table class="table table-hover text-center align-middle">
                <thead class="table-light">
                    <tr>
                        <th>Patient</th>
                        <th>Doctor</th>
                        <th>Date</th>
                        <th>Time</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="table">
                    <tr>
                        <td colspan="6" class="text-center">No Appointments</td>
                    </tr>
                </tbody>
            </table>

        </div>

    </div>

</div>

<!-- MODAL -->
<div class="modal fade" id="modal">
<div class="modal-dialog modal-dialog-centered">
<div class="modal-content p-4">

<h5 class="mb-3 text-center">Book Appointment</h5>

<select id="patient" class="form-control mb-3">
    <option value="" disabled selected>Select Patient</option>
</select>

<select id="doctor" class="form-control mb-3">
    <option value="" disabled selected>Select Doctor</option>
</select>

<input type="date" id="date" class="form-control mb-3">
<input type="time" id="time" class="form-control mb-3">

<button class="btn btn-success w-100" onclick="saveAppointment()">Save</button>

</div>
</div>
</div>

<!-- Scripts -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="js/data.js"></script>
<script src="js/appointments.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
