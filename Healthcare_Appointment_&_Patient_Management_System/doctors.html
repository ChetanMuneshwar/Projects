<!DOCTYPE html>
<html>
<head>
    <title>Doctors</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            position: relative;
        }

        /* Background Image */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url("./Assets/Doctor_bg_image.jpg") no-repeat center;
            background-size: cover;
            z-index: -2;
        }

        /* Overlay */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: -1;
        }

        /* Card */
        .doctor-card {
            border-radius: 15px;
            background: rgba(255,255,255,0.95);
        }

        /* Header */
        .card-header {
            background: #6c757d;
            color: white;
        }

        /* Title */
        .page-title {
            text-align: center;
            color: white;
            margin-bottom: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <h2 class="page-title">👨‍⚕️ Doctors Management</h2>

    <div class="card doctor-card shadow">

        <!-- Header -->
        <div class="card-header d-flex justify-content-between align-items-center">
            <h4 class="mb-0">Doctors List</h4>
            <button class="btn btn-light" data-bs-toggle="modal" data-bs-target="#modal">
                + Add Doctor
            </button>
        </div>

        <!-- Body -->
        <div class="card-body">

            <table class="table table-hover text-center align-middle">
                <thead class="table-light">
                    <tr>
                        <th>Name</th>
                        <th>Specialization</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="table"></tbody>
            </table>

        </div>

    </div>

</div>

<!-- Modal -->
<div class="modal fade" id="modal">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content p-4">

            <h5 class="mb-3 text-center">Add Doctor</h5>

            <input id="name" class="form-control mb-3" placeholder="Enter Name">

            <select id="spec" class="form-control mb-3">
                <option>Cardiology</option>
                <option>Dermatology</option>
                <option>Neurology</option>
            </select>

            <button class="btn btn-success w-100" onclick="saveDoctor()">Save</button>

        </div>
    </div>
</div>

<!-- Scripts -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="js/data.js"></script>
<script src="js/doctors.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
