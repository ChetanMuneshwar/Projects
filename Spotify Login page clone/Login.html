<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>

    <header class="logo">
       <div class="logo-main" style="background-image: url('./Assets/logo.jpg');"></div>
    </header>

    <section class="greeting">Welcome Back</section>

    <section class="login"> 
        <div class="login-details">Email or username</div>
        <input class="login-field" type="text">
        <div class="button1 continue">Continue</div>
        <div class="or">or</div>

        
        <div class="button2 continueWithMobile">
            <i class="fa-solid fa-mobile-screen-button fa-flip-horizontal" style="color: #f7f7f7;"></i>
             Continue with phone number
        </div>
        
         <div class="button3 continueWithGoogle">
            <i class="fa-brands fa-google" style="color: #f7f7f7;"></i>
             Continue with Google
        </div>
        
        <div class="button4 continueWithFacebook">
            <i class="fa-brands fa-facebook" style="color: #f7f7f7;"></i>
             Continue with Facebook
        </div>

          <div class="button5 continueWithFacebook">
            <i class="fa-brands fa-apple" style="color: #f7f7f7;"></i>
             Continue with Apple
        </div>
        
    </section>

    
</body>
</html>
